# ═══════════════════════════════════════════════════════════════
# .github/workflows/ci.yml — GitHub Actions CI/CD Pipeline
#
# Triggers on: push to main, or pull request to main
#
# Jobs:
#   1. lint-and-build  → Install + build frontend to catch errors
#   2. docker-build    → Build & push Docker images to DockerHub
# ═══════════════════════════════════════════════════════════════

name: CI — Build & Push Docker Images

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:

  # ─────────────────────────────────────────
  # Job 1: Build Frontend (catch build errors early)
  # ─────────────────────────────────────────
  lint-and-build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # ─────────────────────────────────────────
  # Job 2: Build & Push Docker Images to DockerHub
  # ─────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint-and-build          # Only runs if Job 1 passes
    if: github.ref == 'refs/heads/main'   # Only on main branch push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push — Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          dockerfile: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/codecanon-backend:latest

      - name: Build & Push — Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/codecanon-frontend:latest
