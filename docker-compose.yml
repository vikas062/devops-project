# ═══════════════════════════════════════════════════════════════
# docker-compose.yml — CodeCanon Local Dev + Monitoring Stack
# ═══════════════════════════════════════════════════════════════
#
# Services:
#   frontend   → React app served by Nginx (port 80)
#   backend    → Express API (port 5000)
#   prometheus → Metrics collection (port 9090)
#   grafana    → Monitoring dashboard (port 3001)
# ═══════════════════════════════════════════════════════════════

version: "3.8"

services:

  # ─────────────────────────────────────────
  # Frontend — React + Nginx
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codecanon-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codecanon-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Backend — Node.js Express API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codecanon-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    networks:
      - codecanon-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Prometheus — Metrics Scraper
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: codecanon-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - codecanon-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Grafana — Monitoring Dashboard
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: codecanon-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - codecanon-net
    restart: unless-stopped

# ─────────────────────────────────────────
# Networks & Volumes
# ─────────────────────────────────────────
networks:
  codecanon-net:
    driver: bridge

volumes:
  grafana-data:
