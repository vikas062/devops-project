# ═══════════════════════════════════════════════════════════════
# frontend-service.yaml — CodeCanon Frontend Service
# Exposes frontend on NodePort 30080
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: codecanon-frontend-svc
spec:
  type: NodePort
  selector:
    app: codecanon-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
