# ═══════════════════════════════════════════════════════════════
# backend-service.yaml — CodeCanon Backend Service
# Exposes backend API on NodePort 30500
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: codecanon-backend-svc
spec:
  type: NodePort
  selector:
    app: codecanon-backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
      protocol: TCP
